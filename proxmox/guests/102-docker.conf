# Proxmox CT 102 - Docker LXC
# Snapshot of `pct config 102`. Created via the community Proxmox helper script
# (https://community-scripts.github.io/ProxmoxVE/scripts?id=docker).
# Static IP 192.168.1.30/24. dev0 passes the host Samsung T7 (sdb) into the container.
# Runs Docker CE. Containers are defined in proxmox/guests/docker/.
# Edit the live CT with `pct set 102 ...`; re-snapshot with proxmox/scripts/snapshot.sh.

arch: amd64
cores: 4
dev0: /dev/sdb
features: keyctl=1,nesting=1
hostname: docker
memory: 8096
net0: name=eth0,bridge=vmbr0,gw=192.168.1.1,ip=192.168.1.30/24,type=veth
onboot: 1
ostype: debian
rootfs: local-lvm:vm-102-disk-0,size=4G
swap: 512
unprivileged: 1
