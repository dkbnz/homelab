# Proxmox CT 102 - Docker LXC
# Snapshot of `pct config 102` plus the raw lxc.* lines from /etc/pve/lxc/102.conf.
# Created via the community Proxmox helper script
# (https://community-scripts.github.io/ProxmoxVE/scripts?id=docker).
# Static IP 192.168.1.30/24. Runs Docker CE; the jellystack media stack is defined
# in proxmox/guests/docker/. Edit the live CT with `pct set 102 ...`.
#
# Storage:
#   rootfs  4G   OS only (local-lvm thin pool)
#   mp0     8G   /opt/jellystack/appdata  ext4 on local  - configs + databases + TS state
#   mp1          /opt/jellystack/media    bind of host /mnt/t7/jellystack-media (T7, ext4)
#   mp2     16G  /var/lib/docker          ext4 on local  - Docker images/layers (grown 8->12G for
#                monitoring, 12->16G 2026-06-13 after it hit 93%). NOTE: mp0+mp2 can outgrow the 25G
#                root fs if both fill; the daily fstrim cron keeps allocation near actual use.
#   mp4          /opt/monitoring/data     bind of host /mnt/t7/monitoring (T7, ext4) - Prometheus TSDB + Grafana data
#   mp5          /opt/books/data          bind of host /mnt/t7/books (T7, ext4) - CWA library + ingest + Shelfmark config
#   mp6          /opt/desktop/config      bind of host /mnt/t7/desktop (T7, ext4) - Selkies/Webtop desktop home dir
# (mp3, the minecraft world bind, was removed 2026-06-06 when the server moved off the lab.)
# Docker data lives on mp2 (NOT the 4G rootfs) so image pulls can't fill and corrupt
# the rootfs. The old `dev0: /dev/sdb` raw passthrough was removed - it exposed the
# bare device without the filesystem, so it was never usable storage.
# dev0 passes the iGPU render node (UHD 620) for Jellyfin QSV transcoding;
# gid=106 maps it to the CT's `render` group.
# The T7 (host /mnt/t7) was reformatted exfat -> ext4 so the *arr apps get real Unix
# ownership and hardlinks; it is mounted by UUID via /etc/fstab. The two lxc.* lines
# pass /dev/net/tun into the unprivileged container, required by gluetun (WireGuard
# VPN) and the Tailscale sidecars (TS_USERSPACE=false).

arch: amd64
cores: 4
dev0: /dev/dri/renderD128,gid=106
features: keyctl=1,nesting=1
hostname: docker
memory: 12288
mp0: local:102/vm-102-disk-0.raw,mp=/opt/jellystack/appdata,size=8G
mp1: /mnt/t7/jellystack-media,mp=/opt/jellystack/media
mp2: local:102/vm-102-disk-1.raw,mp=/var/lib/docker,size=16G
mp4: /mnt/t7/monitoring,mp=/opt/monitoring/data
mp5: /mnt/t7/books,mp=/opt/books/data
mp6: /mnt/t7/desktop,mp=/opt/desktop/config
net0: name=eth0,bridge=vmbr0,gw=192.168.1.1,ip=192.168.1.30/24,type=veth
onboot: 1
ostype: debian
rootfs: local-lvm:vm-102-disk-0,size=4G
swap: 512
unprivileged: 1
lxc.cgroup2.devices.allow: c 10:200 rwm
lxc.mount.entry: /dev/net/tun dev/net/tun none bind,create=file
