# Watchtower - automatic container image updates on the Docker LXC (CT 102).
# Updates daily at 04:00 Pacific/Auckland and removes old images.
#
# Uses the maintained fork (nicholas-fedor) - the original containrrr/watchtower
# is abandoned and its Docker API client (v1.25) is rejected by modern dockerd
# (min API 1.40), which crash-loops it.
#
# Deploy:  docker compose -f watchtower.compose.yml up -d
services:
  watchtower:
    image: ghcr.io/nicholas-fedor/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - 8085:8080   # metrics API for Prometheus (token in watchtower.env)
    env_file:
      - watchtower.env   # WATCHTOWER_HTTP_API_TOKEN (encrypted via transcrypt)
    environment:
      - TZ=Pacific/Auckland
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_SCHEDULE=0 0 4 * * *
      - WATCHTOWER_INCLUDE_RESTARTING=true
      - WATCHTOWER_HTTP_API_METRICS=true   # /v1/metrics; scheduled updates keep running
