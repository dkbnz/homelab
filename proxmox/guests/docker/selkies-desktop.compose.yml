# Selkies (linuxserver Webtop) browser desktop on CT 102.
# XFCE streamed over WebRTC (the Selkies stack powers linuxserver's Webtop image).
# Reached on the LAN at http://192.168.1.30:3010 and via http://desktop.home
# (Caddy -> :3010; the *.home wildcard resolves through AdGuard).
#
# Deploy:
#   docker compose -f selkies-desktop.compose.yml --env-file selkies-desktop.env up -d
#
# /config (the desktop home dir) lives on the T7 via CT 102 mp6
# (/opt/desktop/config), not the constrained local fs. See selkies-desktop.md.
services:
  webtop:
    image: lscr.io/linuxserver/webtop:debian-xfce
    container_name: webtop
    security_opt:
      - seccomp:unconfined          # required by the Selkies/Chromium sandbox
    env_file:
      - selkies-desktop.env          # CUSTOM_USER / PASSWORD (encrypted via transcrypt)
    environment:
      - PUID=10000
      - PGID=10000
      - TZ=${TZ}
      - TITLE=Homelab Desktop
      - PIXELFLUX_WAYLAND=true        # GPU-rendered Wayland session (Smithay+Labwc)
                                     # instead of the default Xvfb (software llvmpipe).
                                     # Needs AVX2 (i7-8650U has it). This is what makes
                                     # OpenGL apps use the iGPU - no VirtualGL needed.
      - DRINODE=/dev/dri/renderD128  # GPU for rendering (EGL)
      - DRI_NODE=/dev/dri/renderD128 # GPU for encode (VAAPI); == DRINODE -> zero-copy
      - LIBVA_DRIVER_NAME=iHD         # correct VA driver for UHD 620 (Gen9)
      - WLR_NO_HARDWARE_CURSORS=1     # labwc (wlroots) draws the pointer on a HW
                                     # cursor plane the capture misses -> invisible
                                     # cursor. Force a software cursor so it is in
                                     # the captured frame.
    group_add:
      - "106"                        # render group: lets abc open renderD128
                                     # (VA-API stream encode + OpenGL game render).
                                     # Without it both fall back to CPU -> lag.
    volumes:
      - /opt/desktop/config:/config
      # cont-init script (on the T7) reinstalls VirtualGL on each boot so it
      # survives watchtower image updates. vglrun -d egl renders OpenGL on the
      # UHD 620 (renderD128) instead of llvmpipe. See selkies-desktop.md.
      - /opt/desktop/config/custom-cont-init.d:/custom-cont-init.d
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
    ports:
      - 3010:3000                    # http (host 3000 is taken by Grafana)
      - 3011:3001                    # https (self-signed); optional
    shm_size: "1gb"                 # browser stability
    restart: unless-stopped
