services:
  # =========================================================
  # Tailscale — a single subnet router replaces the old per-app
  # ts-* sidecars. Remote access to every app is via the LAN
  # route + split DNS (*.home through AdGuard + Caddy).
  # =========================================================
  # Subnet router — advertises the LAN (192.168.1.0/24) to the tailnet so
  # remote devices reach AdGuard DNS and Caddy (every *.home URL) without
  # per-service sidecars. Two console-side steps (see jellystack.md):
  # approve the route, and add split DNS home -> 192.168.1.20.
  ts-subnet-router:
    image: tailscale/tailscale:latest
    container_name: ts-subnet-router
    hostname: homelab-lan
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_HOSTNAME=homelab-lan
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_ROUTES=192.168.1.0/24
      - TS_EXTRA_ARGS=--accept-dns=false
    volumes:
      - ./appdata/ts-subnet-router/state:/var/lib/tailscale
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    restart: unless-stopped

  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./appdata/jellyfin:/config
      - ./media/tv:/data/tvshows
      - ./media/movies:/data/movies
      - ./media/music:/data/music
    devices:
      - /dev/dri:/dev/dri   # QSV transcoding (UHD 620, via CT 102 dev0 passthrough)
    restart: unless-stopped

  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}
    volumes:
      - ./appdata/jellyseerr:/app/config
    restart: unless-stopped

  # =========================================================
  # *arr suite + Prowlarr — LAN-only on phone (172.16.42.1)
  # =========================================================
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./appdata/sonarr:/config
      - ./media/tv:/tv
      - ./media/downloads:/downloads
    ports:
      - 8989:8989
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./appdata/radarr:/config
      - ./media/movies:/movies
      - ./media/downloads:/downloads
    ports:
      - 7878:7878
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./appdata/prowlarr:/config
    ports:
      - 9696:9696
    restart: unless-stopped

  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./appdata/sabnzbd:/config
      - ./media/downloads:/downloads
    ports:
      - 8081:8080
    restart: unless-stopped

  # =========================================================
  # VPN + qBittorrent — qBit pinned to gluetun netns
  # qBit WebUI on phone LAN at http://172.16.42.1:8080
  # =========================================================
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=surfshark
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - SERVER_COUNTRIES=${SURFSHARK_COUNTRY}
      - TZ=${TZ}
    volumes:
      - ./appdata/gluetun:/gluetun
    ports:
      - 8080:8080
      - 6881:6881
      - 6881:6881/udp
      - 8090:8090   # qbittorrent-exporter (rides this netns); Prometheus scrapes it
      - 5030:5030   # slskd web/API (rides this netns too)
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    volumes:
      - ./appdata/qbittorrent:/config
      - ./media/downloads:/downloads
    restart: unless-stopped

  # Prometheus exporter for qBittorrent. Lives in gluetun's netns (same as qBit)
  # so it reaches the WebUI on localhost; cross-project network_mode isn't
  # possible, which is why it's here and not in monitoring.compose.yml.
  qbittorrent-exporter:
    image: ghcr.io/esanchezm/prometheus-qbittorrent-exporter:latest
    container_name: qbittorrent-exporter
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
      - qbittorrent
    environment:
      - QBITTORRENT_HOST=localhost
      - QBITTORRENT_PORT=8080
      - QBITTORRENT_USER=${QBIT_USER}
      - QBITTORRENT_PASS=${QBIT_PASS}
      - EXPORTER_PORT=8090
    restart: unless-stopped

  # =========================================================
  # FlareSolverr — Cloudflare bypass for Prowlarr indexers
  # =========================================================
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}
    ports:
      - 8191:8191
    restart: unless-stopped

  # =========================================================
  # Unpackerr — auto-extract obfuscated/RAR releases for arrs
  # =========================================================
  unpackerr:
    image: golift/unpackerr:latest
    container_name: unpackerr
    user: ${PUID}:${PGID}
    environment:
      - TZ=${TZ}
      - UN_SONARR_0_URL=http://sonarr:8989
      - UN_SONARR_0_API_KEY=${SONARR_API_KEY}
      - UN_SONARR_0_PATHS_0=/downloads/tv
      - UN_RADARR_0_URL=http://radarr:7878
      - UN_RADARR_0_API_KEY=${RADARR_API_KEY}
      - UN_RADARR_0_PATHS_0=/downloads/movies
    volumes:
      - ./appdata/unpackerr:/config
      - ./media/downloads:/downloads
    restart: unless-stopped

  # =========================================================
  # Music pipeline: Lidarr -> (usenet/torrents via Prowlarr) or
  # (Soulseek via Soularr + slskd). Navidrome serves the library.
  # Requests go directly in the Lidarr UI (http://lidarr.home) -
  # jellyseerr music support is still preview-only, not in stable.
  # =========================================================
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./appdata/lidarr:/config
      - ./media/music:/music
      - ./media/downloads:/downloads
    ports:
      - 8686:8686
    restart: unless-stopped

  # slskd — headless Soulseek client. Rides gluetun's netns like qBittorrent so
  # all Soulseek traffic goes over the VPN; web/API published via gluetun :5030.
  # API key for Soularr lives in appdata/slskd/slskd.yml (generated at deploy
  # from jellystack/slskd/slskd.yml.tmpl — see jellystack.md); everything else
  # is configured here via env. Shares the music library back (read-only).
  slskd:
    image: slskd/slskd:latest
    container_name: slskd
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    user: ${PUID}:${PGID}
    environment:
      - SLSKD_SLSK_USERNAME=${SLSK_USER}
      - SLSKD_SLSK_PASSWORD=${SLSK_PASS}
      - SLSKD_USERNAME=${SLSKD_WEB_USER}
      - SLSKD_PASSWORD=${SLSKD_WEB_PASS}
      - SLSKD_DOWNLOADS_DIR=/downloads/complete
      - SLSKD_INCOMPLETE_DIR=/downloads/incomplete
      - SLSKD_SHARED_DIR=/music
      - SLSKD_METRICS=true
      - SLSKD_METRICS_NO_AUTH=true   # LAN/VPN only, same call as jellyfin /metrics
      - TZ=${TZ}
    volumes:
      - ./appdata/slskd:/app
      - ./media/downloads/slskd:/downloads
      - ./media/music:/music:ro
    restart: unless-stopped

  # Soularr — bridges Lidarr's wanted list to slskd. Polls Lidarr, searches
  # Soulseek, downloads via slskd, triggers the Lidarr import. Config (API
  # keys) in appdata/soularr/config.ini, generated at deploy from
  # jellystack/soularr/config.ini.tmpl.
  soularr:
    image: mrusse08/soularr:latest
    container_name: soularr
    user: ${PUID}:${PGID}
    environment:
      - TZ=${TZ}
      - SCRIPT_INTERVAL=300
    volumes:
      - ./appdata/soularr:/data
      - ./media/downloads:/downloads
    depends_on:
      - lidarr
    restart: unless-stopped

  # Navidrome — music server (Subsonic API). Reads the same library Lidarr
  # manages. http://navidrome.home everywhere (LAN direct, remote via the
  # subnet router).
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    user: ${PUID}:${PGID}
    environment:
      - ND_MUSICFOLDER=/music
      - ND_SCANSCHEDULE=1h
      - ND_PROMETHEUS_ENABLED=true
      - TZ=${TZ}
    volumes:
      - ./appdata/navidrome:/data
      - ./media/music:/music:ro
    restart: unless-stopped

  # Reverse proxy for clean local URLs (http://jellyfin.home, http://jellyseerr.home).
  # Names resolve via AdGuard DNS rewrites (*.home -> 192.168.1.30).
  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/data:/data
      - ./caddy/config:/config
    depends_on:
      - jellyfin
      - jellyseerr
