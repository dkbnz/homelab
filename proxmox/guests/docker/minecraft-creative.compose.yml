# Throwaway creative Minecraft world for prototyping, on CT 102.
#
# Superflat world, creative mode, peaceful. Reachable on the LAN at
# 192.168.1.30:25565 and over the tailnet via the CT 102 subnet router
# (no public exposure, no router port-forward). This is separate from the
# real survival server, which runs off-lab on an external host.
#
# The world wipes daily at 09:00 Pacific/Auckland via mc-creative-reset.sh
# (/etc/cron.d/mc-creative-reset on the Proxmox host): it stops the container,
# deletes the world*/ region data, and restarts so itzg regenerates a fresh
# flat world. Server config (server.properties is rebuilt from the env below,
# plus any ops/whitelist/plugins) is preserved across resets.
#
# World data lives in the named docker volume mc-creative-data, which sits on
# CT 102's /var/lib/docker (the 16G mp2 raw on `local`), NOT on the small root
# fs and NOT on the T7. A flat world that resets daily stays tiny.
services:
  minecraft-creative:
    image: itzg/minecraft-server:java25
    container_name: minecraft-creative
    restart: unless-stopped
    ports:
      - "25565:25565"          # LAN + tailnet (via subnet router); no public exposure
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      VERSION: "LATEST"        # itzg resolves latest Paper at (re)start
      MEMORY: "2G"
      USE_AIKAR_FLAGS: "true"
      TZ: "Pacific/Auckland"
      MOTD: "Creative prototyping - wipes daily 9am"
      MODE: "creative"
      FORCE_GAMEMODE: "true"   # rejoin always lands in creative
      DIFFICULTY: "peaceful"
      LEVEL_TYPE: "minecraft:flat"   # big infinite superflat area
      GENERATE_STRUCTURES: "false"
      SPAWN_MONSTERS: "false"
      SPAWN_NPCS: "false"
      ALLOW_NETHER: "false"
      VIEW_DISTANCE: "10"
      # ONLINE_MODE defaults to true (Java/Mojang auth). No Bedrock/Geyser here.
    volumes:
      - mc-creative-data:/data
    stdin_open: true
    tty: true

volumes:
  mc-creative-data:
    name: mc-creative-data
