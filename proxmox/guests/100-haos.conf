# Proxmox VM 100 - Home Assistant OS 12.4
# Snapshot of `qm config 100`. Created via the community Proxmox helper script
# (https://community-scripts.github.io/ProxmoxVE/scripts?id=haos-vm).
# USB passthrough: usb0 = Zigbee/serial dongle (10c4:ea60), usb1 = Intel Bluetooth (8087:0a2a).
# Edit the live VM with `qm set 100 ...`; re-snapshot with proxmox/scripts/snapshot.sh.

agent: 1
bios: ovmf
boot: order=scsi0
cores: 2
efidisk0: local-lvm:vm-100-disk-0,efitype=4m,size=4M
localtime: 1
memory: 4096
name: haos12.4
net0: virtio,bridge=vmbr0
onboot: 1
ostype: l26
scsi0: local-lvm:vm-100-disk-1,cache=writethrough,discard=on,size=32G,ssd=1
scsihw: virtio-scsi-pci
tablet: 0
usb0: host=10c4:ea60
usb1: host=8087:0a2a
