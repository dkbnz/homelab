# Proxmox CT 101 - AdGuard Home LXC
# Snapshot of `pct config 101`. Created via the community Proxmox helper script
# (https://community-scripts.github.io/ProxmoxVE/scripts?id=adguard).
# Static IP 192.168.1.20/24. Application config lives in proxmox/guests/adguard/.
# Edit the live CT with `pct set 101 ...`; re-snapshot with proxmox/scripts/snapshot.sh.

arch: amd64
cores: 1
features: keyctl=1,nesting=1
hostname: adguard
memory: 1024
net0: name=eth0,bridge=vmbr0,gw=192.168.1.1,ip=192.168.1.20/24,type=veth
onboot: 1
ostype: debian
rootfs: local-lvm:vm-101-disk-0,size=8G
swap: 512
unprivileged: 1
